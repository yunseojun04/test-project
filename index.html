<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Recipe</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="./style.css" rel="stylesheet"> 
</head>
<body>
<header>
    <h1>Smart Recipe</h1>
    <p>가지고 있는 재료를 입력하면 식품안전나라 API를 바탕으로 레시피를 추천해 드립니다.</p>
</header>
<main class="container">
    <section class="search-box">
        <h2>가지고 있는 재료</h2>
        <input id="ingredientInput" placeholder="예: 달걀, 양파, 감자, 닭가슴살">
        <input id="recipeSearch" placeholder="레시피 이름 검색">
        <div class="button-group">
            <button id="recommendBtn">추천받기</button>
            <select id="sortSelect">
                <option value="score">추천순</option>
                <option value="time">조리 시간순</option>
                <option value="protein">단백질순</option>
            </select>
            <button class="filter">전체</button>
            <button class="filter">쉬움</button>
            <button class="filter">보통</button>
            <button class="filter">어려움</button>
        </div>
    </section>
    <div id="loading">불러오는 중...</div>
    <h2 class="result-title">추천 레시피</h2>
    <section class="cards">
        <div class="empty-message">레시피를 불러오는 중...</div>
    </section>
</main>
<div id="recipeModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <img id="modalImage" alt="">
        <h2 id="modalTitle"></h2>
        <div class="modalInfo">
            <p><b>난이도:</b> <span id="modalDifficulty"></span></p>
            <p><b>조리 시간:</b> <span id="modalTime"></span>분</p>
            <p><b>칼로리:</b> <span id="modalKcal"></span>kcal</p>
        </div>
        <h3>재료</h3>
        <ul id="modalIngredients"></ul>
        <h3>영양 정보</h3>
        <div id="nutritionBox"></div>
        <h3>조리 순서</h3>
        <ol id="modalSteps"></ol>
    </div>
</div>
<footer>&copy; 2026 Smart Recipe</footer>
<script src="recommend.js"></script>
<script src="script.js"></script>
</body>
</html>
